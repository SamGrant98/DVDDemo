<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DVD Stack Prototype</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>

  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #111114; }
    #ui {
      position: fixed; top: 12px; left: 12px;
      padding: 10px 12px; border-radius: 10px;
      background: rgba(0,0,0,0.6); color: white;
      font: 14px/1.3 system-ui;
      pointer-events: none;
      max-width: 420px;
    }
    #controls {
      position: fixed; top: 12px; right: 12px;
      padding: 12px; border-radius: 14px;
      background: rgba(0,0,0,0.55); color: white;
      font: 12px/1.2 system-ui;
      width: 320px;
      user-select: none;
      backdrop-filter: blur(6px);
    }
    #controls .title { font-weight: 700; margin-bottom: 10px; }
    #controls .row { display: grid; grid-template-columns: 1fr 70px; gap: 10px; align-items: center; margin: 10px 0 6px; }
    #controls label { opacity: 0.92; }
    #controls input[type="range"] { width: 100%; }
    #controls .val { text-align: right; opacity: 0.9; font-variant-numeric: tabular-nums; }

    #meta {
      position: fixed; right: 12px; top: 360px; width: 320px;
      padding: 12px; border-radius: 14px;
      background: rgba(0,0,0,0.55); color: #fff;
      font: 12px/1.35 system-ui;
      display: none;
      backdrop-filter: blur(6px);
    }
    #metaHeader {
      display:flex; justify-content:space-between; gap:10px; align-items:center;
      margin-bottom: 8px;
    }
    #metaHeader .h { font-weight: 700; }
    #btnBack {
      pointer-events: auto;
      cursor: pointer;
      border: 0;
      border-radius: 10px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.14);
      color: white;
      font: 12px system-ui;
    }
    #btnBack:hover { background: rgba(255,255,255,0.2); }

    #hint {
      position: fixed; bottom: 12px; left: 12px;
      padding: 8px 10px; border-radius: 10px;
      background: rgba(0,0,0,0.4); color: white;
      font: 12px/1.3 system-ui;
      pointer-events: none;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div id="ui">Drag / wheel to scroll • Click a DVD to focus • Click again to flip</div>
  <div id="hint">Click empty space or press Esc to exit focus</div>

  <div id="controls"></div>

  <div id="meta">
    <div id="metaHeader">
      <div class="h">DVD Details</div>
      <button id="btnBack">Back</button>
    </div>
    <div id="metaBody"></div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
